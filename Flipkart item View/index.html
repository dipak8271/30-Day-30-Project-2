<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css">

    
</head>
<body>
    <div class="brand"><img src="/image/brandlogo.png" alt=""></div>
    <div class="container">
        <div class="main-image">
            <img src="/image/image1.webp" alt="">
        </div>
        <div class="product-thumbnail">
            <div class="thumbnail active"><img src="/image/image1.webp" alt=""></div>
            <div class="thumbnail"><img src="/image/image2.webp" alt=""></div>
            <div class="thumbnail"><img src="/image/image3.webp" alt=""></div>
            <div class="thumbnail"><img src="/image/image4.webp" alt=""></div>
            <div class="thumbnail"><img src="/image/image5.webp" alt=""></div>
            <div class="thumbnail"><img src="/image/image6.webp" alt=""></div>
        </div>
        <div class="content">
                <h1>Men's Leather Derby Shoes for Classic Formal Style</h1>
                <div class="product_meta"><span>Color : Teak</span> <span>Vendor : Red Tape</span> <span>Model : RTE5858-7</span></div>
                <div class="discount">Save 83%</div>
                <div class="price">$35.00 <del>$134.00</del> <span>Size Chart</span></div>
                <div class="size-container">
                    <div class="size">Size: 7</div>
                    <div class="size-preview">
                        <div class="size active">7</div>
                        <div class="size">8</div>
                        <div class="size">9</div>
                        <div class="size">10</div>
                    </div>
                </div>
                <div class="control">
                    <div class="add-to-cart">
                        <div class="count">
                            <button class="plus"> - </button>
                            <div class="product-count">1</div>
                            <button class="plus"> + </button>
                        </div>
                        <button class="add-to-cart-button">Add To Cart</button>
                    </div>
                    <button class="buy-button">Buy Now <i class="fa-solid fa-angle-right"></i></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
