<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="keys">
        <div data-key="65" class="key">
            <kbd>A</kbd>
            <span class="sound">clap</span>
        </div>
        <div data-key="83" class="key">
            <kbd>S</kbd>
            <span class="sound">boom</span>
        </div>
        <div data-key="68" class="key">
            <kbd>D</kbd>
            <span class="sound">hihat</span>
        </div>
        <div data-key="70" class="key">
            <kbd>F</kbd>
            <span class="sound">kick</span>
        </div>
        <div data-key="71" class="key">
            <kbd>G</kbd>
            <span class="sound">openh</span>
        </div>
        <div data-key="74" class="key">
            <kbd>J</kbd>
            <span class="sound">snare</span>
        </div>
        <div data-key="16" class="key">
            <kbd>Shift</kbd>
            <span class="sound">tink</span>
        </div>
        <div data-key="75" class="key">
            <kbd>K</kbd>
            <span class="sound">tom</span>
        </div>
        <div data-key="76" class="key">
            <kbd>L</kbd>
            <span class="sound">spin</span>
        </div>


    </div>
    

    <audio data-key="65" src="/audio/clap.mp3"></audio>
    <audio data-key="83" src="/audio/boom.mp3"></audio>
    <audio data-key="68" src="/audio/hihat.mp3"></audio>
    <audio data-key="70" src="/audio/kick.mp3"></audio>
    <audio data-key="71" src="/audio/openhat.mp3"></audio>
    <audio data-key="74" src="/audio/snare.mp3"></audio>
    <audio data-key="16" src="/audio/tink.mp3"></audio>
    <audio data-key="75" src="/audio/tom.mp3"></audio>
    <audio data-key="76" src="/audio/spinopelbig.mp3"></audio>


    <script>
        
        function playsound(e){
            const audio = document.querySelector(`audio[data-key="${e.keyCode}"]`);
            const key = document.querySelector(`.key[data-key="${e.keyCode}"]`);
            if(!audio) return;
            audio.currentTime = 0;
            audio.play();
            key.classList.add('playing'); 
        };

        function removeTransition(e){
            if(e.propertyName !== 'transform') return;
            this.classList.remove('playing');
            // console.log(e.propertName);s
        }

        const keys = document.querySelectorAll('.key');
        keys.forEach(key => key.addEventListener('transitionend', removeTransition));
        window.addEventListener('keydown', playsound)

    </script>

</body>
</html>
